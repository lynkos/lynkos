name: Update Stats GIF

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # runs every day at midnight
  push:
    branches: main
    paths: main.py

env:
  GIF_NAME: output_test

defaults:
  run:
    shell: bash

permissions:
  contents: write

jobs:
  update-stats-gif:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install FFMPEG
        run: |
          sudo apt update && sudo apt install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          pip-install: --upgrade github-readme-terminal

      # - name: Cache pip packages
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.cache/pip
      #     key: ${{ runner.os }}-pip-${{ github.workflow }}
      #     restore-keys: |
      #       ${{ runner.os }}-pip-

      # - name: Install pip
      #   run: |
      #     python -m venv .venv
      #     source .venv/bin/activate
      #     python -m pip install --upgrade github-readme-terminal
      #     echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
      #     echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> $GITHUB_ENV

      - name: Patch gifos to display Top 15 Languages
        run: |
          python - <<'PY'
          from pathlib import Path
          from inspect import getfile
          from re import sub
          try:
            from gifos.utils import fetch_github_stats as mod
            p = Path(getfile(mod))
          except Exception:
            from sys import path as sys_path
            sp = [p for p in sys_path if 'site-packages' in p or 'dist-packages' in p]
            p = None
            for base in sp:
              candidate = Path(base) / 'gifos' / 'utils' / 'fetch_github_stats.py'
              if candidate.exists():
                p = candidate
                break
              if p is None: raise SystemExit('fetch_github_stats.py not found')

          text = p.read_text()
          new_text = sub(r"languages_sorted\s*=\s*languages_sorted\[[^\]]*\]\s*,?", "languages_sorted=languages_sorted[:15],", text, count = 1)
          if new_text != text:
            p.write_text(new_text)
            print(f"Patched {p}")
          else: print("No changes made")
          PY
      
      - name: Add Solarized theme
        run: |
          mkdir -p ~/.config/gifos
          cat > ~/.config/gifos/ansi_escape_colors.toml <<'EOF'
          [solarized]
                  [solarized.default_colors]
                  fg = "#839496"
                  bg = "#002b36"

                  [solarized.normal_colors]
                  black = "#073642"
                  red = "#dc322f"
                  green = "#859900"
                  yellow = "#b58900"
                  blue = "#268bd2"
                  magenta = "#d33682"
                  cyan = "#2aa198"
                  white = "#eee8d5"

                  [solarized.bright_colors]
                  black = "#002b36"
                  red = "#cb4b16"
                  green = "#859900"
                  yellow = "#b58900"
                  blue = "#268bd2"
                  magenta = "#6c71c4"
                  cyan = "#2aa198"
                  white = "#fdf6e3"
          EOF

      - name: Add gifos settings
        run: |
          mkdir -p ~/.config/gifos
          cat > ~/.config/gifos/gifos_settings.toml <<'EOF'
          [general]
          debug = false
          cursor = "_"
          show_cursor = true
          blink_cursor = true
          user_name = "lynkos"
          fps = 15
          color_scheme = "solarized"
          loop_count = 0

          [files]
          frame_base_name = "frame_"
          frame_folder_name = "frames"
          output_gif_name = "${GIF_NAME}"
          EOF

      - name: Generate GIF
        run: python main.py
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          # IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}

      - name: Upload GIF
        run: |
          git add "${GIF_NAME}.gif"
          git -c "user.name=github-actions[bot]" -c "user.email=github-actions[bot]@users.noreply.github.com" commit -m "Automatically updated terminal gif on $(date)"
          git push